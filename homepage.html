<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMagic | Home</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #141414; color: white; }
        nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); }
        .logo { color: #e50914; font-size: 2rem; font-weight: bold; }
        .hero { height: 60vh; background: linear-gradient(to bottom, rgba(0,0,0,0.5), #141414), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 4rem; margin-bottom: 10px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px; }
        .movie-card { background: #2f2f2f; border-radius: 10px; overflow: hidden; transition: transform 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 350px; object-fit: cover; }
        .movie-info { padding: 15px; text-align: center; }
        .btn-book { background: #e50914; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <nav><div class="logo">CINEMAGIC</div></nav>
    <header class="hero">
        <h1>Movies, Unlimited.</h1>
        <p>Book your favorite movies in seconds.</p>
    </header>

    <div class="movie-grid">
        <div class="movie-card">
            <img src="https://th.bing.com/th/id/R.f76a782ea27927fe8b18f9db3c32fcc1?rik=tEVo93P72NrBgg&riu=http%3a%2f%2fwww.wearemoviegeeks.com%2fwp-content%2fuploads%2f10644551_10153228184639832_7414697183486256202_o.jpg&ehk=xnsY0gOYRaYUCKcv0CSihlDHY%2fRw2oCAcEwwLK%2bPgCc%3d&risl=&pid=ImgRaw&r=0" alt="Interstellar">
            <div class="movie-info">
                <h3>Interstellar</h3>
                <a href="booking.html?movie=Interstellar" class="btn-book">Book Now</a>
            </div>
        </div>
        <div class="movie-card">
            <img src="https://media.senscritique.com/media/000012872123/source_big/Inception.jpg" alt="Inception">
            <div class="movie-info">
                <h3>Inception</h3>
                <a href="booking.html?movie=Inception" class="btn-book">Book Now</a>
            </div>
        </div>
        <div class="movie-card">
            <img src="https://www.themoviedb.org/t/p/original/pKKvCaL1TPTVtbI6EeliyND3api.jpg" alt="The Dark Knight">
            <div class="movie-info">
                <h3>The Dark Knight</h3>
                <a href="booking.html?movie=The%20Dark%20Knight" class="btn-book">Book Now</a>
            </div>
        </div>
    </div>
</body>
</html>
